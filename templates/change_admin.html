<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Admin - Bharat Bank</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --bg: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
      --card: rgba(15, 23, 42, 0.85);
      --border: rgba(96, 165, 250, 0.2);
      --accent: #3b82f6;
      --gold: #facc15;
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --input-bg: #020617;
      --danger: #ef4444;
      --success: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.7);
      backdrop-filter: blur(14px);
    }

    h2 {
      text-align: center;
      color: var(--gold);
      margin-bottom: 1.8rem;
      font-size: 1.9rem;
      font-weight: 600;
    }

    .flash {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      text-align: center;
      font-weight: 500;
    }

    .flash.success { background: var(--success); }
    .flash.danger   { background: var(--danger); }
    .flash.info     { background: #3b82f6; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .input-box {
      position: relative;
      margin-bottom: 1.2rem;
    }

    input {
      width: 100%;
      padding: 14px 40px 14px 14px;
      background: var(--input-bg);
      border: 1px solid #1e293b;
      border-radius: 10px;
      color: white;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(59,130,246,0.4);
    }

    .eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #64748b;
      font-size: 1.1rem;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #2563eb, #1d4ed8);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(59,130,246,0.6);
    }

    .back {
      text-align: center;
      margin-top: 18px;
    }

    .back a {
      color: var(--accent);
      text-decoration: none;
    }

    .back a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="card">

  <h2>🔐 Change Admin</h2>

  <!-- FLASH MESSAGES -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>Old Username</label>
    <div class="input-box">
      <input type="text" name="old_username" required>
    </div>

    <label>Old Password</label>
    <div class="input-box">
      <input type="password" id="old_password" name="old_password" required>
      <i class="fa-solid fa-eye-slash eye" onclick="togglePassword('old_password', this)"></i>
    </div>

    <label>Admin Secret Number</label>
    <div class="input-box">
      <input type="password" id="admin_no" name="admin_no" required>
      <i class="fa-solid fa-eye-slash eye" onclick="togglePassword('admin_no', this)"></i>
    </div>

    <label>New Username</label>
    <div class="input-box">
      <input type="text" name="new_username" required>
    </div>

    <label>New Password</label>
    <div class="input-box">
      <input type="password" id="new_password" name="new_password" required>
      <i class="fa-solid fa-eye-slash eye" onclick="togglePassword('new_password', this)"></i>
    </div>

    <button type="submit">
      <i class="fa-solid fa-user-shield"></i> Change Admin
    </button>

  </form>

  <div class="back">
    <a href="/admin_dashboard">⬅ Back to Dashboard</a>
  </div>

</div>

<script>
function togglePassword(id, icon) {
  let input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  }
}
</script>

</body>
</html>
