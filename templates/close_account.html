{% extends "base.html" %}

{% block content %}

<div class="page-container">

<div class="card">

<h2 class="title">Close Bank Account</h2>

<p class="warning">
⚠ Account close करने से पहले balance <b>₹0</b> होना चाहिए और कोई <b>active loan</b> नहीं होना चाहिए.
</p>

<form method="POST" class="form">

<!-- CSRF TOKEN -->
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div class="form-group">

<label>Enter MPIN</label>

<div class="input-wrapper">

<input 
type="password"
name="mpin"
placeholder="Enter your MPIN"
required
autocomplete="off"
>

<button type="button" class="eye-toggle">
<i class="fa-solid fa-eye"></i>
</button>

</div>

</div>

<button type="submit" class="close-btn">
<i class="fa-solid fa-user-xmark"></i>
Close Account
</button>

</form>

<div class="back-section">
<a href="/dashboard" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Back to Dashboard
</a>
</div>

</div>

</div>

<style>

*{
box-sizing:border-box;
}

.page-container{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:40px 15px;
background:linear-gradient(135deg,#0f172a,#1e293b);
}

.card{
background:#1e293b;
padding:35px;
border-radius:12px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
border:1px solid rgba(96,165,250,0.15);
}

.title{
color:#60a5fa;
margin-bottom:15px;
font-size:26px;
}

.warning{
color:#f87171;
background:#020617;
padding:12px;
border-radius:6px;
font-size:14px;
margin-bottom:20px;
}

.form-group{
text-align:left;
margin-bottom:20px;
}

.form-group label{
color:#cbd5e1;
font-size:14px;
margin-bottom:6px;
display:block;
}

.input-wrapper{
position:relative;
width:100%;
}

.input-wrapper input{
width:100%;
padding:12px 40px 12px 12px;
border-radius:6px;
background:#0f172a;
color:white;
border:1px solid #334155;
font-size:15px;
}

.input-wrapper input:focus{
outline:none;
border-color:#60a5fa;
box-shadow:0 0 0 2px rgba(96,165,250,0.2);
}

.eye-toggle{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
color:#94a3b8;
cursor:pointer;
font-size:16px;
}

.eye-toggle:hover{
color:#60a5fa;
}

.close-btn{
background:#ef4444;
border:none;
padding:12px;
width:100%;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.close-btn:hover{
background:#dc2626;
}

.back-section{
margin-top:20px;
text-align:center;
}

.back-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 18px;
background:linear-gradient(135deg,#1e293b,#334155);
border:1px solid #475569;
border-radius:10px;
color:#e2e8f0;
text-decoration:none;
font-size:14px;
}

.back-btn:hover{
transform:translateY(-2px);
}

</style>

<script>

document.querySelectorAll('.eye-toggle').forEach(btn=>{

btn.addEventListener('click',()=>{

const input=btn.parentElement.querySelector('input');
const icon=btn.querySelector('i');

if(input.type==='password'){
input.type='text';
icon.classList.replace('fa-eye','fa-eye-slash');
}else{
input.type='password';
icon.classList.replace('fa-eye-slash','fa-eye');
}

});

});

</script>

{% endblock %}
