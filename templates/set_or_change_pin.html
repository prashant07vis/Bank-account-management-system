<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set / Change ATM PIN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .pin-input {
      width: 3rem;
      height: 3.5rem;
      text-align: center;
      font-size: 1.5rem;
      border: 2px solid #4b5563;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    .pin-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
      outline: none;
    }
    .form-card {
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full form-card bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
    
    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl">
        🔐
      </div>
      <div>
        <h1 class="text-2xl font-semibold">Set / Change ATM PIN</h1>
        <p class="text-zinc-400 text-sm">Secure your account with a new 4-digit PIN</p>
      </div>
    </div>

    <form method="POST" action="/set_or_change_pin" id="pinForm" class="space-y-6">

      <!-- CSRF Token -->
      {{ csrf_token() }}

      <!-- MPIN -->
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-2">Enter MPIN</label>
        <div class="relative">
          <input 
            type="password" 
            name="mpin" 
            id="mpin"
            maxlength="6"
            required
            class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500 transition-colors">
          <button type="button" onclick="togglePassword('mpin')" class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-200">
            <i class="fa-solid fa-eye" id="mpin-icon"></i>
          </button>
        </div>
      </div>

      <!-- OTP -->
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-2">Enter OTP</label>
        <input 
          type="text" 
          name="otp" 
          maxlength="6"
          required
          class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-blue-500 transition-colors">
      </div>

      <!-- New ATM PIN -->
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-2">New ATM PIN (4 digits)</label>
        <div class="flex gap-3 justify-center" id="new-pin-container">
          <!-- 4 individual inputs generated by JS -->
        </div>
        <input type="hidden" name="new_pin" id="new_pin_hidden" required>
      </div>

      <!-- Old ATM PIN (for change) -->
      <div id="old-pin-section" class="hidden">
        <label class="block text-sm font-medium text-zinc-400 mb-2">Old ATM PIN (4 digits)</label>
        <div class="flex gap-3 justify-center" id="old-pin-container">
          <!-- 4 individual inputs generated by JS -->
        </div>
        <input type="hidden" name="old_pin" id="old_pin_hidden">
      </div>

      <!-- Submit Button -->
      <button 
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 transition-colors text-white font-semibold py-4 rounded-2xl text-lg flex items-center justify-center gap-2">
        <i class="fa-solid fa-check"></i>
        Update PIN
      </button>

    </form>

    <!-- Status Message -->
    <div id="status" class="mt-6 text-center text-sm hidden"></div>

  </div>

  <script>
    // Tailwind script already included via CDN

    function togglePassword(id) {
      const input = document.getElementById(id);
      const icon = document.getElementById(id + '-icon');
      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = "password";
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // Create 4-digit PIN input boxes
    function createPinInputs(containerId, hiddenId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      
      for (let i = 0; i < 4; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 1;
        input.className = 'pin-input bg-zinc-800 text-white';
        input.inputMode = 'numeric';
        
        input.addEventListener('input', () => {
          if (input.value.length === 1 && i < 3) {
            container.children[i + 1].focus();
          }
          updateHiddenPin(containerId, hiddenId);
        });

        // Allow backspace to move previous
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && input.value === '' && i > 0) {
            container.children[i - 1].focus();
          }
        });

        container.appendChild(input);
      }
    }

    function updateHiddenPin(containerId, hiddenId) {
      const inputs = document.getElementById(containerId).querySelectorAll('input');
      let pin = '';
      inputs.forEach(inp => pin += inp.value);
      document.getElementById(hiddenId).value = pin;
    }

    // Initialize PIN inputs
    window.onload = () => {
      createPinInputs('new-pin-container', 'new_pin_hidden');
      createPinInputs('old-pin-container', 'old_pin_hidden');

      // Optional: Show old PIN section based on some logic (e.g., query param or radio)
      // For demo, let's show it by default. You can control via backend or JS.
      // document.getElementById('old-pin-section').classList.remove('hidden');
    };

    // Simple form feedback (you can enhance with real backend response)
    document.getElementById('pinForm').addEventListener('submit', function(e) {
      const status = document.getElementById('status');
      status.classList.remove('hidden');
      // You would normally handle this via AJAX or after form submission
    });
  </script>
</body>
</html>
