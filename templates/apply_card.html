<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Debit Card – Bharat Bank</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
            --border: rgba(96, 165, 250, 0.3);
            --accent: #60a5fa;
            --text: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 50px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .form-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header i { font-size: 4.2rem; color: var(--accent); margin-bottom: 15px; }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .header p { color: #94a3b8; font-size: 1.05rem; }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--accent);
            font-weight: 600;
            font-size: 1.05rem;
        }

        input, select {
            width: 100%;
            padding: 18px 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: white;
            font-size: 1.05rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.25);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(96, 165, 250, 0.4);
        }

        .preview-container { width: 100%; max-width: 380px; }

        .preview-title {
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent);
            font-size: 1.3rem;
            font-weight: 500;
        }

        .debit-card {
            width: 340px;
            height: 210px;
            border-radius: 20px;
            padding: 25px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin: 0 auto;
            background: linear-gradient(135deg, #1e40af, #0f172a);
        }

        .card-logo {
            position: absolute;
            top: 25px;
            right: 25px;
            height: 50px;
            max-width: 110px;
            object-fit: contain;
        }

        .card-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .bank-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-number {
            margin-top: 50px;
            font-size: 1.45rem;
            letter-spacing: 4px;
            font-weight: 500;
        }

        .card-bottom {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .card-holder { font-size: 1.15rem; font-weight: 500; }
        .expiry { text-align: right; font-size: 1.05rem; line-height: 1.4; }

        .message {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 40px;
            border-radius: 14px;
            font-size: 1.15rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .success { background: linear-gradient(90deg, #10b981, #34d399); }
        .error   { background: linear-gradient(90deg, #ef4444, #f87171); }
    </style>
</head>
<body>

    <div class="main-container">

        <!-- Form Section -->
        <div class="form-container">
            <div class="header">
                <i class="fa-solid fa-credit-card"></i>
                <h1>Apply for Debit Card</h1>
                <p>Choose your preferred variant</p>
            </div>

            <form method="POST" action="/apply_debit_card">
                <!-- CSRF Token (Required by Flask-WTF) -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="variant">Select Card Variant</label>
                    <select name="variant" id="variant" required>
                        <option value="">-- Select Card Type --</option>
                        <option value="RuPay Classic">RuPay Classic - ₹100 charge | ₹20,000 daily limit</option>
                        <option value="RuPay Platinum">RuPay Platinum - ₹200 charge | ₹40,000 daily limit</option>
                        <option value="RuPay Select">RuPay Select - ₹300 charge | ₹60,000 daily limit</option>
                        <option value="Visa Classic">Visa Classic - ₹150 charge | ₹25,000 daily limit</option>
                        <option value="Visa Gold">Visa Gold - ₹250 charge | ₹50,000 daily limit</option>
                        <option value="Visa Platinum">Visa Platinum - ₹350 charge | ₹75,000 daily limit</option>
                        <option value="Visa Signature">Visa Signature - ₹500 charge | ₹1,00,000 daily limit</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mpin">Enter MPIN</label>
                    <input type="password" 
                           name="mpin" 
                           id="mpin" 
                           maxlength="6" 
                           placeholder="Enter 6-digit MPIN"
                           required>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-paper-plane"></i> Apply Now
                </button>
            </form>
        </div>

        <!-- Live Card Preview -->
        <div class="preview-container">
            <div class="preview-title">Live Card Preview</div>
            
            <div class="debit-card">
                <img id="cardLogo" 
                     src="https://upload.wikimedia.org/wikipedia/commons/d/d1/RuPay.svg" 
                     class="card-logo" 
                     alt="Network Logo">

                <div class="card-content">
                    <div class="bank-name">BHARAT BANK</div>
                    <div class="card-number">XXXX XXXX XXXX 4242</div>
                    <div class="card-bottom">
                        <div class="card-holder">YOUR NAME</div>
                        <div class="expiry">
                            VALID THRU<br>
                            <span>12/29</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Toast (for any client-side messages) -->
    <div class="message" id="messageBox"></div>

    <script>
        // Logo Switcher
        const variantSelect = document.getElementById('variant');
        const cardLogo = document.getElementById('cardLogo');

        variantSelect.addEventListener('change', function() {
            const val = this.value.toLowerCase();
            if (val.includes('rupay')) {
                cardLogo.src = "https://upload.wikimedia.org/wikipedia/commons/d/d1/RuPay.svg";
            } else if (val.includes('visa')) {
                cardLogo.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Visa_Inc._logo_(2021–present).svg/2560px-Visa_Inc._logo_(2021–present).svg.png";
            }
        });
    </script>
</body>
</html>
