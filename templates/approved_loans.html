{% extends "base.html" %}

{% block content %}

<h2 class="title">Approved Loans</h2>

<div class="table-card">

<table class="loan-table">

<tr>
<th>Account Number</th>
<th>Customer Name</th>
<th>Loan Amount</th>
<th>Approved Date</th>
</tr>

{% for loan in loans %}

<tr>

<td>{{loan[0]}}</td>
<td>{{loan[1]}} {{loan[2]}}</td>
<td class="amount">₹{{loan[3]}}</td>
<td>{{loan[4]}}</td>

</tr>

{% endfor %}

</table>

</div>

<a href="/admin_dashboard" class="back-btn">← Back to Dashboard</a>

<style>

.title{
text-align:center;
margin-top:20px;
font-size:28px;
}

.table-card{
background:#1e293b;
padding:25px;
margin:40px auto;
max-width:900px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.loan-table{
width:100%;
border-collapse:collapse;
}

.loan-table th{
background:#3b82f6;
color:white;
padding:12px;
}

.loan-table td{
padding:12px;
text-align:center;
border-bottom:1px solid #334155;
}

.loan-table tr:hover{
background:#0f172a;
}

.amount{
color:#22c55e;
font-weight:bold;
}

.back-btn{
display:block;
text-align:center;
margin:25px auto;
padding:10px 18px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:8px;
width:220px;
}

.back-btn:hover{
background:#2563eb;
}

</style>

{% endblock %}
