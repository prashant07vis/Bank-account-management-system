{% extends "base.html" %}

{% block content %}

<h2 class="title">Rejected Loan Records</h2>

<div class="table-container">

<table class="loan-table">

<tr>
<th>Account</th>
<th>Name</th>
<th>Amount</th>
<th>Request Date</th>
</tr>

{% for loan in loans %}

<tr>

<td>{{loan[0]}}</td>
<td>{{loan[1]}} {{loan[2]}}</td>
<td class="amount">₹{{loan[3]}}</td>
<td>{{loan[4]}}</td>

</tr>

{% endfor %}

</table>

</div>

<a href="/admin_dashboard" class="back-btn">← Back to Dashboard</a>

<style>

.title{
text-align:center;
margin-top:20px;
font-size:28px;
}

.table-container{
margin-top:30px;
overflow-x:auto;
}

.loan-table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.loan-table th{
background:#ef4444;
color:white;
padding:14px;
text-align:center;
}

.loan-table td{
padding:12px;
text-align:center;
border-bottom:1px solid #334155;
}

.loan-table tr:hover{
background:#0f172a;
}

.amount{
font-weight:bold;
color:#ef4444;
}

.back-btn{
display:inline-block;
margin-top:25px;
padding:10px 18px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>

{% endblock %}
