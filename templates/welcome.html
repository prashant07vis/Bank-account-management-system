<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bharat Bank - Secure Access</title>

  <!-- Important security headers (fallback – ideally set on server too) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self';
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- No caching for entry page -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #60a5fa;
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --gradient: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: var(--gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .splash-container {
      text-align: center;
      max-width: 90%;
      padding: 1rem;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.6rem;
      letter-spacing: 1px;
    }

    .welcome-hindi {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1.2rem;
      line-height: 1.3;
    }

    .tagline {
      font-size: 1.5rem;
      color: var(--text-light);
      margin-bottom: 2.5rem;
    }

    .loader {
      width: 64px;
      height: 64px;
      border: 5px solid rgba(96,165,250,0.25);
      border-top: 5px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 1.5rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .btn-secure {
      display: inline-block;
      padding: 1rem 2.8rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease;
    }

    .btn-secure:hover {
      background: #3b82f6;
    }
  </style>
</head>

<body>

  <div class="splash-container">

    <div class="logo">Bharat Bank</div>

    <div class="welcome-hindi">भारत बैंक में आपका स्वागत है</div>

    <p class="tagline">Your Trust, Our Responsibility</p>

    <div class="loader"></div>

    <div class="message">
      Verifying secure connection...<br>
      Please wait a moment.
    </div>

    <!-- No auto-redirect – user must click -->
    <a href="/system_check" class="btn-secure">Proceed to Secure Access</a>

  </div>

</body>
</html>
