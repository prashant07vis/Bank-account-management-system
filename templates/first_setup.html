<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bharat Bank - First Time Setup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .setup-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.12);
            position: relative;
            overflow: hidden;
        }

        .setup-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(96,165,250,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .logo-container {
            margin-bottom: 1.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .bank-icon {
            font-size: 3.8rem;
            color: #60a5fa;
            margin-bottom: 0.4rem;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #93c5fd;
            margin-bottom: 1rem;
        }

        .message {
            font-size: 1.15rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 2.2rem;
        }

        .highlight {
            color: #93c5fd;
            font-weight: 600;
        }

        .setup-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            color: white;
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .setup-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.45);
            background: linear-gradient(90deg, #60a5fa, #93c5fd);
        }

        .setup-btn i {
            font-size: 1.3rem;
        }

        @media (max-width: 480px) {
            .setup-card {
                padding: 2.5rem 1.8rem;
            }
            h1 {
                font-size: 2.1rem;
            }
            .setup-btn {
                padding: 0.95rem 2rem;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="setup-card">
        <div class="logo-container">
            <i class="fa-solid fa-building-columns bank-icon"></i>
            <h1>Bharat Bank</h1>
        </div>

        <div class="message">
            Admin is not configured yet.<br>
            Please <span class="highlight">create the first admin setup</span> to activate the full banking system.
        </div>

        <a href="/setup_admin" class="setup-btn">
            <i class="fa-solid fa-user-shield"></i>
            Create Admin Setup
        </a>
    </div>

</body>
</html>
