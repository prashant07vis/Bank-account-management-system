{% extends "base.html" %}

{% block content %}

<h2 class="title">Bank Statistics Dashboard</h2>

<div class="stats">

<div class="card">
<div class="icon">👤</div>
<h3>Total Accounts</h3>
<p>{{total_accounts}}</p>
</div>

<div class="card">
<div class="icon">💰</div>
<h3>Total Bank Balance</h3>
<p>₹{{total_money}}</p>
</div>

<div class="card">
<div class="icon">🏦</div>
<h3>Total Loans Approved</h3>
<p>{{total_loans}}</p>
</div>

</div>

<a href="/admin_dashboard" class="back-btn">← Back to Dashboard</a>

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.title{
text-align:center;
margin-top:20px;
font-size:28px;
letter-spacing:1px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
padding:20px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

.card h3{
color:#93c5fd;
margin-top:10px;
}

.card p{
font-size:26px;
font-weight:bold;
margin-top:10px;
}

.icon{
font-size:35px;
}

.back-btn{
display:inline-block;
margin-top:30px;
padding:12px 20px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.back-btn:hover{
background:#2563eb;
}

</style>

{% endblock %}
